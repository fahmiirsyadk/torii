# Replace the model and MCP tool names with entries reported by
# `/workflow check`. The checkpoint is mandatory and interrupted mutation
# attempts never replay automatically after /resume.
name: approved-github-mutation
version: 1
description: Prepare, approve, and perform one exact GitHub mutation with a typed receipt

roles:
  planner:
    agent: plan
    capability: read-only
    thinking: high
  mutator:
    agent: general-purpose
    model: provider/mutation-model
    capability: all
    session: ephemeral
    tools: [mcp__github__add_issue_comment]

steps:
  - id: prepare
    role: planner
    prompt: >-
      Inspect the request and repository context. Specify exactly one proposed
      GitHub issue comment target and body. Do not perform external mutations.
    reports: none
    guardrails:
      max_prompt_bytes: 65536
      max_artifacts: 0
      max_artifact_bytes: 0
      on_violation: fail

  - type: checkpoint
    id: approve-github-write
    description: Review and approve the exact proposed GitHub mutation.

  - id: apply-github-write
    role: mutator
    prompt: >-
      Apply only the approved GitHub issue comment described by the prepare
      artifact. Perform no other operation. If the target or body is ambiguous,
      do not mutate and return a not_applied receipt.
    reports: [prepare]
    output: effect_receipt
    external_effects:
      approved_by: approve-github-write
    guardrails:
      max_prompt_bytes: 98304
      max_artifacts: 1
      max_artifact_bytes: 24576
      allowed_models: [provider/mutation-model]
      allowed_tools: [mcp__github__add_issue_comment]
      require_stable_cache_prefix: false
      on_violation: fail
